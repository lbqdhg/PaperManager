<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文投稿记录管理系统v2.0</title>
    <link rel="icon" href="hhxc.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <style>
        /* --- 基础样式 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        
        /* --- 登录层样式 --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 15px;
            width: 350px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .login-box h2 { color: #333; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 5px;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #667eea; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-size: 16px;
        }
        .login-box button:hover { background: #764ba2; }
        .login-error { color: red; font-size: 14px; margin-top: 10px; display: none; }

        /* --- 主界面样式 (原有) --- */
        .container { max-width: 1400px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 15px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); overflow: hidden; display: none; /* 默认隐藏，登录后显示 */ }
        .header { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 25px; text-align: center; position: relative;}
        .logout-btn { position: absolute; right: 20px; top: 25px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        .controls { padding: 25px; background: #f8f9fa; border-bottom: 1px solid #e9ecef; display: flex; gap: 15px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s ease; text-decoration: none; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); color: white; }
        .search-box { flex: 1; min-width: 200px; }
        .search-box input { width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 14px; }
        .table-container { padding: 25px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08); }
        th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 10px; text-align: center; font-weight: 600; font-size: 13px; white-space: nowrap; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f3f4; text-align: center; font-size: 13px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        tr:hover { background: rgba(102, 126, 234, 0.05); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; color: white; }
        
        /* 状态颜色 */
        .status-Submitted { background: #17a2b8; }
        .status-Under-Review { background: #ffc107; color: #212529; }
        .status-Accepted { background: #28a745; }
        .status-Rejected { background: #dc3545; }
        .status-Reject-\&-Submit { background: #dc3545; }
        .status-Awaiting-AE-Recommendation { background: #6f42c1; }
        .status-Awaiting-EIC-Decision { background: #20c997; }
        .status-Decision-in-Process { background: #007bff; }
        .status-RRC { background: #6c757d; }
        .status-Custom { background: #fd7e14; }

        /* 模态框样式 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 2% auto; padding: 0; border-radius: 15px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 25px; border-radius: 15px 15px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 14px; transition: border-color 0.3s ease; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .close { color: white; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        /* 进度条 */
        .progress-timeline { margin-top: 15px; }
        .timeline-item { display: flex; align-items: center; margin-bottom: 10px; padding: 8px; background: #f8f9fa; border-radius: 5px; flex-wrap: wrap; }
        .timeline-date { font-weight: 600; margin-right: 10px; min-width: 80px; }
        .timeline-status { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; margin-right: 10px; }
        .timeline-note { flex: 1; font-size: 12px; color: #666; margin-right: 10px; font-style: italic; }
        .new-progress-entry { display: flex; gap: 10px; margin-top: 10px; align-items: flex-start; flex-wrap: wrap; }
        .new-progress-entry input[type="text"], .new-progress-entry select, .new-progress-entry textarea { flex: 1; min-width: 120px; padding: 8px; border: 1px solid #ced4da; border-radius: 5px; }
        .new-progress-entry textarea { min-height: 60px; resize: vertical; }

        @media (max-width: 768px) {
            .controls { flex-direction: column; }
            .form-row { grid-template-columns: 1fr; }
            th, td { font-size: 11px; padding: 8px 5px; }
            .timeline-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2>🔒 身份验证</h2>
            <p style="color: #666; margin-bottom: 20px; font-size: 13px;">本系统仅限管理员访问</p>
            <form id="loginForm">
                <input type="email" id="emailInput" placeholder="请输入邮箱" required>
                <input type="password" id="passwordInput" placeholder="请输入密码" required>
                <button type="submit" id="loginBtn">登录系统</button>
            </form>
            <div id="loginError" class="login-error">账号或密码错误</div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <div class="header">
            <h1>📚 论文投稿记录管理系统</h1>
            <button class="logout-btn" onclick="logout()">退出登录</button>
            <p>云端同步 · 安全存储</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="openModal()">📝 新建投稿</button>
            <button class="btn btn-success" onclick="exportData()">📊 导出CSV</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索论文题目或期刊..." oninput="searchSubmissions()">
            </div>
        </div>

        <div class="table-container">
            <table id="submissionsTable">
                <thead>
                    <tr>
                        <th>编号</th>
                        <th>短标题</th>
                        <th>论文题目</th>
                        <th>投稿期刊</th>
                        <th>影响因子</th>
                        <th>中科院分区</th>
                        <th>投稿时间</th>
                        <th>当前状态</th>
                        <th>更新时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="submissionsBody">
                </tbody>
            </table>
        </div>
    </div>

    <div id="submissionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新建投稿记录</h2>
                <span class="close" onclick="closeModal()">×</span>
            </div>
            <div class="modal-body">
                <form id="submissionForm">
                    <input type="hidden" id="editingFileName">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="submissionNumber">编号 *</label>
                            <input type="number" id="submissionNumber" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="shortTitle">短标题 *</label>
                            <input type="text" id="shortTitle" required placeholder="如：MyPaper_ML">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="paperTitle">论文题目 *</label>
                            <input type="text" id="paperTitle" required>
                        </div>
                        <div class="form-group">
                            <label for="authors">论文作者 *</label>
                            <input type="text" id="authors" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="journal">投稿期刊 *</label>
                            <input type="text" id="journal" required>
                        </div>
                        <div class="form-group">
                            <label for="impactFactor">影响因子</label>
                            <input type="number" id="impactFactor" step="0.001">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="journalLevel">期刊级别</label>
                            <select id="journalLevel">
                                <option value="SCI Q1">SCI Q1</option>
                                <option value="SCI Q2">SCI Q2</option>
                                <option value="SCI Q3">SCI Q3</option>
                                <option value="SCI Q4">SCI Q4</option>
                                <option value="EI">EI</option>
                                <option value="核心期刊">核心期刊</option>
                                <option value="普通期刊">普通期刊</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="casLevel">中科院分区</label>
                            <select id="casLevel">
                                <option value="">请选择</option>
                                <option value="1区">1区</option>
                                <option value="1区Top">1区Top</option>
                                <option value="2区">2区</option>
                                <option value="2区Top">2区Top</option>
                                <option value="3区">3区</option>
                                <option value="4区">4区</option>
                                <option value="不适用">不适用</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="reviewerCount">审稿人数量</label>
                            <input type="number" id="reviewerCount" min="0" max="10">
                        </div>
                        <div class="form-group">
                            <label for="journalWebsite">期刊网站</label>
                            <input type="url" id="journalWebsite">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="submissionWebsite">投稿网站</label>
                        <input type="url" id="submissionWebsite">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="journalAccount">期刊账号密码</label>
                            <input type="text" id="journalAccount" placeholder="例如：账号 / 密码">
                        </div>
                        <div class="form-group">
                            <label for="manuscriptId">Manuscript ID</label>
                            <input type="text" id="manuscriptId" placeholder="例如：JMLR-2023-1234">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>投稿进度记录</label>
                        <div id="progressTimeline" class="progress-timeline"></div>
                        <div class="new-progress-entry">
                            <input type="text" id="newProgressDate" placeholder="日期" class="flatpickr-input">
                            <select id="newProgressStatus">
                                <option value="">Select Status</option>
                                <option value="Submitted">Submitted</option>
                                <option value="Under Review">Under Review</option>
                                <option value="Revision">Revision</option>
                                <option value="Accept">Accept</option>
                                <option value="Reject">Reject</option>
                                <option value="Reject & Submit">Reject & Submit</option>
                                <option value="Awaiting AE Recommendation">Awaiting AE Recommendation</option>
                                <option value="Awaiting EIC Decision">Awaiting EIC Decision</option>
                                <option value="Decision in Process">Decision in Process</option>
                                <option value="RRC">RRC</option>
                                <option value="Custom">Custom...</option>
                            </select>
                            <textarea id="newProgressNote" placeholder="备注信息（可选）" rows="2"></textarea>
                            <input type="text" id="customStatusInput" placeholder="Enter custom status" style="display:none;">
                            <button type="button" class="btn btn-warning" onclick="addProgressEntry()">➕</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="reviewerStatus">审稿人情况</label>
                        <textarea id="reviewerStatus" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="notes">备注</label>
                        <textarea id="notes" rows="3"></textarea>
                    </div>

                    <div style="text-align: right; margin-top: 25px;">
                        <button type="button" class="btn btn-danger" onclick="closeModal()">取消</button>
                        <button type="submit" class="btn btn-primary">💾 保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

<script type="module">
    // 引入 Firebase SDK (增加了 Auth 模块)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // 你的 Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyDwO7Jc8qiyGU-WCWj0-eUGFqQZK6-O85M",
        authDomain: "mypapertracker-25674.firebaseapp.com",
        projectId: "mypapertracker-25674",
        storageBucket: "mypapertracker-25674.firebasestorage.app",
        messagingSenderId: "438953417934",
        appId: "1:438953417934:web:001355491d955a6f59449f"
    };

    // 初始化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app); // 初始化认证
    const COLLECTION_NAME = "submissions";

    // 全局变量
    let localSubmissions = [];
    let nextSubmissionNumber = 1;

    // 挂载函数
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.addProgressEntry = addProgressEntry;
    window.removeProgressEntry = removeProgressEntry;
    window.editSubmission = editSubmission;
    window.deleteSubmission = deleteSubmission;
    window.exportData = exportData;
    window.searchSubmissions = searchSubmissions;
    window.logout = logout; // 挂载退出函数

    // 引用 DOM
    const loginOverlay = document.getElementById('loginOverlay');
    const mainContainer = document.getElementById('mainContainer');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');

    // --- 认证逻辑 ---

    // 1. 监听登录状态变化
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // 已登录
            console.log("用户已登录:", user.email);
            loginOverlay.style.display = 'none';
            mainContainer.style.display = 'block';
            loadDataFromCloud(); // 只有登录后才加载数据
        } else {
            // 未登录
            console.log("用户未登录");
            loginOverlay.style.display = 'flex';
            mainContainer.style.display = 'none';
        }
    });

    // 2. 登录表单提交
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;
        const btn = document.getElementById('loginBtn');
        
        btn.textContent = '登录中...';
        btn.disabled = true;
        loginError.style.display = 'none';

        try {
            await signInWithEmailAndPassword(auth, email, password);
            // 登录成功后，onAuthStateChanged 会自动处理界面切换
        } catch (error) {
            console.error(error);
            loginError.textContent = "登录失败: 账号或密码错误";
            loginError.style.display = 'block';
            btn.textContent = '登录系统';
            btn.disabled = false;
        }
    });

    // 3. 退出登录
    function logout() {
        if(confirm("确定要退出登录吗？")) {
            signOut(auth);
            // 退出后，onAuthStateChanged 会自动切换回登录页
        }
    }

    // --- 数据逻辑 (保持不变) ---
    const form = document.getElementById('submissionForm');
    const newProgressStatus = document.getElementById('newProgressStatus');
    const customStatusInput = document.getElementById('customStatusInput');

    // 监听下拉菜单变化，控制自定义输入框的显示与隐藏
    newProgressStatus.addEventListener('change', function() {
        if (this.value === 'Custom') {
            customStatusInput.style.display = 'inline-block'; // 显示输入框
            customStatusInput.focus(); // 自动聚焦
        } else {
            customStatusInput.style.display = 'none'; // 隐藏输入框
            customStatusInput.value = ''; // 清空未使用的输入
        }
    });
    
    if (typeof flatpickr !== 'undefined') {
        flatpickr("#newProgressDate", { dateFormat: "Y.m.d", locale: "zh", defaultDate: new Date() });
    }

    async function loadDataFromCloud() {
        const tbody = document.getElementById('submissionsBody');
        tbody.innerHTML = '<tr><td colspan="10">☁️ 正在加密加载数据...</td></tr>';
        localSubmissions = [];
        let maxNumber = 0;

        try {
            const querySnapshot = await getDocs(collection(db, COLLECTION_NAME));
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                data.id = doc.id; 
                if (data.number > maxNumber) maxNumber = data.number;
                
                const latestProgress = getLatestProgress(data.progress);
                data.lastUpdatedDate = latestProgress.date;
                data.currentStatus = latestProgress.status;
                if (!data.submissionDate || data.submissionDate === 'N/A') {
                    data.submissionDate = getSubmissionDate(data.progress);
                }
                
                localSubmissions.push(data);
            });

            localSubmissions.sort((a, b) => {
                const dateA = a.lastUpdatedDate ? parseDateString(formatDateToYM_D(a.lastUpdatedDate)) : new Date(0);
                const dateB = b.lastUpdatedDate ? parseDateString(formatDateToYM_D(b.lastUpdatedDate)) : new Date(0);
                return dateB - dateA;
            });

            nextSubmissionNumber = maxNumber + 1;
            renderTable(localSubmissions);

        } catch (error) {
            console.error("加载失败:", error);
            // 如果是因为权限问题（未登录），这里也会捕获到
            tbody.innerHTML = `<tr><td colspan="10" style="color:red">加载失败: ${error.message} (可能未获得授权)</td></tr>`;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('submissionsBody');
        tbody.innerHTML = '';
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10">暂无数据，点击"新建投稿"添加。</td></tr>';
            return;
        }
        data.forEach(item => {
            const displayDate = item.lastUpdatedDate ? formatDateToYM_D(item.lastUpdatedDate) : '-';
            const row = tbody.insertRow();
            row.innerHTML = `
                <td>${item.number}</td>
                <td title="${item.shortTitle}">${truncateText(item.shortTitle, 15)}</td>
                <td title="${item.paperTitle}">${truncateText(item.paperTitle, 25)}</td>
                <td>${item.journal || '-'}</td>
                <td>${item.impactFactor || '-'}</td>
                <td>${item.casLevel || '-'}</td>
                <td>${item.submissionDate || '-'}</td>
                <td><span class="status-badge ${getStatusClass(item.currentStatus)}">${item.currentStatus}</span></td>
                <td>${displayDate}</td>
                <td>
                    <button class="btn btn-warning" onclick="editSubmission('${item.id}')" style="padding: 5px 10px;">查看/编辑</button>
                    <button class="btn btn-danger" onclick="deleteSubmission('${item.id}')" style="padding: 5px 10px;">删除</button>
                </td>
            `;
        });
        searchSubmissions();
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submissionNum = parseInt(document.getElementById('submissionNumber').value);
        const shortTitle = document.getElementById('shortTitle').value.trim();
        const progressList = Array.from(document.getElementById('progressTimeline').children).map(item => ({
            date: item.querySelector('.timeline-date').textContent,
            status: item.querySelector('.timeline-status').textContent,
            note: item.querySelector('.timeline-note').textContent
        }));

        const formData = {
            number: submissionNum,
            shortTitle: shortTitle,
            paperTitle: document.getElementById('paperTitle').value.trim(),
            authors: document.getElementById('authors').value.trim(),
            journal: document.getElementById('journal').value.trim(),
            impactFactor: document.getElementById('impactFactor').value,
            journalLevel: document.getElementById('journalLevel').value,
            casLevel: document.getElementById('casLevel').value,
            journalWebsite: document.getElementById('journalWebsite').value.trim(),
            submissionWebsite: document.getElementById('submissionWebsite').value.trim(),
            journalAccount: document.getElementById('journalAccount').value.trim(), // 新增抓取字段
            manuscriptId: document.getElementById('manuscriptId').value.trim(),     // 新增抓取字段
            reviewerCount: parseInt(document.getElementById('reviewerCount').value) || 0,
            reviewerStatus: document.getElementById('reviewerStatus').value.trim(),
            notes: document.getElementById('notes').value.trim(),
            submissionDate: getSubmissionDate(progressList),
            progress: progressList
        };

        let docId = document.getElementById('editingFileName').value; 
        if (!docId) {
            docId = `${submissionNum}-${shortTitle.replace(/[\s\\/:"*?<>|]+/g, '_')}`;
        }

        try {
            await setDoc(doc(db, COLLECTION_NAME, docId), formData);
            alert("✅ 保存到云端成功！");
            closeModal();
            loadDataFromCloud();
        } catch (error) {
            alert(`保存失败: ${error.message}`);
        }
    });

    async function editSubmission(docId) {
        const submission = localSubmissions.find(s => s.id === docId);
        if (submission) {
            openModal();
            document.getElementById('modalTitle').textContent = `查看/编辑: ${submission.shortTitle}`;
            document.getElementById('editingFileName').value = docId;
            document.getElementById('submissionNumber').value = submission.number;
            document.getElementById('shortTitle').value = submission.shortTitle;
            document.getElementById('paperTitle').value = submission.paperTitle;
            document.getElementById('authors').value = submission.authors;
            document.getElementById('journal').value = submission.journal;
            document.getElementById('impactFactor').value = submission.impactFactor;
            document.getElementById('journalLevel').value = submission.journalLevel;
            document.getElementById('casLevel').value = submission.casLevel;
            document.getElementById('journalWebsite').value = submission.journalWebsite || '';
            document.getElementById('submissionWebsite').value = submission.submissionWebsite || '';
            document.getElementById('journalAccount').value = submission.journalAccount || ''; // 新增赋值
            document.getElementById('manuscriptId').value = submission.manuscriptId || '';     // 新增赋值
            document.getElementById('reviewerCount').value = submission.reviewerCount;
            document.getElementById('reviewerStatus').value = submission.reviewerStatus;
            document.getElementById('notes').value = submission.notes;
            renderProgressTimeline(submission.progress || []);
        }
    }

    async function deleteSubmission(docId) {
        if (confirm("确定要从云端彻底删除这条记录吗？")) {
            try {
                await deleteDoc(doc(db, COLLECTION_NAME, docId));
                alert("已删除");
                loadDataFromCloud();
            } catch (error) {
                alert(`删除失败: ${error.message}`);
            }
        }
    }

    // 辅助函数保持不变
    function getSubmissionDate(progressArray) {
        if (!progressArray || progressArray.length === 0) return 'N/A';
        const submissionEntry = progressArray.find(entry => entry.status === 'Submitted');
        return submissionEntry ? submissionEntry.date : 'N/A';
    }
    function parseDateString(dateString) { if (!dateString) return null; const parts = dateString.split(/[.-]/).map(Number); return new Date(parts[0], parts[1] - 1, parts[2]); }
    function formatDateToYM_D(date) { if (!date) return 'N/A'; if (typeof date.getMonth !== 'function') return 'N/A'; return `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`; }
    function getLatestProgress(progressArray) { if (!progressArray || progressArray.length === 0) return { date: null, status: 'N/A' }; return { date: parseDateString(progressArray[progressArray.length-1].date), status: progressArray[progressArray.length-1].status }; }
    function truncateText(text, len) { return text && text.length > len ? text.substring(0, len) + '...' : text || '-'; }
    function getStatusClass(status) { const statusMap = { 'Submitted': 'status-Submitted', 'Under Review': 'status-Under-Review', 'Accept': 'status-Accepted', 'Reject': 'status-Rejected', 'Reject & Submit': 'status-Reject-\&-Submit', 'Awaiting AE Recommendation': 'status-Awaiting-AE-Recommendation', 'Awaiting EIC Decision': 'status-Awaiting-EIC-Decision', 'Decision in Process': 'status-Decision-in-Process', 'RRC': 'status-RRC' }; if (status && (status.toLowerCase().includes('editor') || status.toLowerCase().includes('complete'))) { return 'status-Decision-in-Process'; } return statusMap[status] || 'status-Custom'; }
    function openModal() { form.reset(); document.getElementById('editingFileName').value = ''; document.getElementById('submissionNumber').value = nextSubmissionNumber; document.getElementById('modalTitle').textContent = '新建投稿'; document.getElementById('progressTimeline').innerHTML = ''; customStatusInput.style.display = 'none'; document.getElementById('submissionModal').style.display = 'block'; }
    function closeModal() { document.getElementById('submissionModal').style.display = 'none'; }
    function addProgressEntry() { const dateInput = document.getElementById('newProgressDate'); const statusSelect = document.getElementById('newProgressStatus'); const noteInput = document.getElementById('newProgressNote'); const customStatus = document.getElementById('customStatusInput'); let date = dateInput.value; let status = statusSelect.value; let note = noteInput.value.trim(); if (status === 'Custom') status = customStatus.value.trim(); if (!date || !status) { alert('日期和状态都不能为空！'); return; } const timeline = document.getElementById('progressTimeline'); const item = document.createElement('div'); item.className = 'timeline-item'; item.innerHTML = ` <span class="timeline-date">${date}</span> <span class="timeline-status ${getStatusClass(status)}">${status}</span> <span class="timeline-note">${note}</span> <button type="button" onclick="removeProgressEntry(this)" style="margin-left: auto; background: #dc3545; color: white; border: none; border-radius: 3px; padding: 2px 6px; cursor: pointer;">删除</button> `; timeline.appendChild(item); }
    function removeProgressEntry(btn) { btn.parentElement.remove(); }
    function renderProgressTimeline(progress) { const timeline = document.getElementById('progressTimeline'); timeline.innerHTML = ''; progress.forEach((entry, index) => { const item = document.createElement('div'); item.className = 'timeline-item'; item.innerHTML = ` <span class="timeline-date">${entry.date}</span> <span class="timeline-status ${getStatusClass(entry.status)}">${entry.status}</span> <span class="timeline-note">${entry.note || ''}</span> <button type="button" onclick="removeProgressEntry(this)" style="margin-left: auto; background: #dc3545; color: white; border: none; border-radius: 3px; padding: 2px 6px; cursor: pointer;">删除</button> `; timeline.appendChild(item); }); }
    function searchSubmissions() { const input = document.getElementById('searchInput'); if (!input) return; const searchTerm = input.value.trim().toLowerCase(); const rows = document.getElementById('submissionsBody').getElementsByTagName('tr'); for (let row of rows) { if (row.children.length <= 1) continue; const textNumber = row.cells[0]?.textContent.toLowerCase() || ""; const textShortTitle = row.cells[1]?.textContent.toLowerCase() || ""; const textPaperTitle = row.cells[2]?.textContent.toLowerCase() || ""; const textJournal = row.cells[3]?.textContent.toLowerCase() || ""; if (textNumber.includes(searchTerm) || textShortTitle.includes(searchTerm) || textPaperTitle.includes(searchTerm) || textJournal.includes(searchTerm)) { row.style.display = ''; } else { row.style.display = 'none'; } } }
    function exportData() { alert("此功能可直接使用，逻辑与之前相同，只需修改数据源。"); }

</script>
